[variables]
NODE_VERSION = "20"
NODE_OPTIONS = "--max-old-space-size=4096"
NEXT_TELEMETRY_DISABLED = "1"

[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
# Prefer lockfile; fall back if lock is temporarily out of sync on the server
cmds = ["npm ci || npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
