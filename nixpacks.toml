[variables]
NODE_VERSION = "20"
NODE_OPTIONS = "--max-old-space-size=4096"
NEXT_TELEMETRY_DISABLED = "1"
# Prefer Build method = Dockerfile. If staying on Nixpacks, clear Install Command
# or set it to: bash ./scripts/easypanel-install.sh
# Set MAIL_* as runtime Environment only — never as Build Args.

[phases.setup]
nixPkgs = ["nodejs_20", "npm-10_x"]

[phases.install]
cmds = ["bash ./scripts/easypanel-install.sh"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "npm run start"
